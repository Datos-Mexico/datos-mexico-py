name: OpenAPI drift (continuous)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Dump live OpenAPI spec
        run: python openapi/update_snapshot.py /tmp/openapi.live.json

      - name: Compute diff against snapshot
        id: diff
        run: |
          set +e
          diff -u openapi/openapi.snapshot.json /tmp/openapi.live.json > /tmp/openapi.diff.txt
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Report drift to summary
        if: steps.diff.outputs.drift == 'true'
        run: |
          {
            echo "## OpenAPI drift detected"
            echo ""
            echo "El spec live difiere del snapshot versionado en \`openapi/openapi.snapshot.json\`."
            echo "Esto es informativo: el build NO falla. Ver artifact \`openapi-drift-diff\` para el diff completo."
            echo ""
            echo "### Primeras 50 líneas del diff"
            echo ""
            echo '```diff'
            head -n 50 /tmp/openapi.diff.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diff artifact
        if: steps.diff.outputs.drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openapi-drift-diff
          path: /tmp/openapi.diff.txt
          retention-days: 30

      - name: Comment drift on PR
        if: steps.diff.outputs.drift == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fullDiff = fs.readFileSync('/tmp/openapi.diff.txt', 'utf8');
            const lines = fullDiff.split('\n');
            const head = lines.slice(0, 30).join('\n');
            const truncated = lines.length > 30;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### OpenAPI drift detectado',
              '',
              'El spec live en `api.datos-itam.org` difiere del snapshot versionado.',
              'Es informativo: este job no falla.',
              '',
              '```diff',
              head,
              '```',
              '',
              truncated ? `_Diff truncado a 30 líneas; ver artifact completo en el [run](${runUrl})._` : `[Ver run](${runUrl})`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
