site_name: datos-mexico
site_description: Cliente Python oficial para la API del Observatorio Datos México
site_url: https://docs.datosmexico.org
repo_url: https://github.com/datos-mexico/datos-mexico-py
repo_name: datos-mexico/datos-mexico-py
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_if_no_docstring: false
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            show_bases: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Quickstart: quickstart.md
  - Conceptos clave:
      - Por qué Decimal: conceptos/decimal.md
      - Identidad contable: conceptos/identidad-contable.md
      - Caveats editoriales: conceptos/caveats-editoriales.md
      - Cache y retries: conceptos/cache-retries.md
  - Tutoriales:
      - CDMX servidores públicos: tutoriales/cdmx.md
      - SAR (CONSAR): tutoriales/consar.md
      - ENIGH (hogares): tutoriales/enigh.md
      - ENOE (mercado laboral): tutoriales/enoe.md
      - Análisis cross-dataset: tutoriales/comparativo.md
  - Reference:
      - Cliente: reference/client.md
      - cdmx: reference/cdmx.md
      - consar: reference/consar.md
      - enigh: reference/enigh.md
      - enoe: reference/enoe.md
      - comparativo: reference/comparativo.md
      - personas: reference/personas.md
      - nombramientos: reference/nombramientos.md
      - demo: reference/demo.md
      - export: reference/export.md
      - Excepciones: reference/exceptions.md
      - Modelos base: reference/models.md
  - Fuentes primarias: sources.md
  - Contribuir: contributing.md
  - FAQ: faq.md
  - Citación: citation.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/datos-mexico/datos-mexico-py
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/datos-mexico/
  generator: false

copyright: >
  Equipo de Datos México · Licencia MIT ·
  <a href="https://datosmexico.org">datosmexico.org</a>
